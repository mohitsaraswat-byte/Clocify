name: Clockify Daily Automation

on:
  schedule:
    # 4:30 AM UTC = 10:00 AM IST (Starts the morning routine)
    - cron: '30 4 * * 1-5' 
    # 12:30 PM UTC = 6:00 PM IST (Starts the evening routine)
    - cron: '30 12 * * 1-5'
  workflow_dispatch: # This adds a button so you can test it manually anytime!

jobs:
  automate-time:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install requests

      - name: Run Automation Script
        env:
          CLOCKIFY_API_KEY: ${{ secrets.CLOCKIFY_API_KEY }}
          CLOCKIFY_WORKSPACE_ID: ${{ secrets.CLOCKIFY_WORKSPACE_ID }}
          CLOCKIFY_USER_ID: ${{ secrets.CLOCKIFY_USER_ID }}
        run: python clockify_automation.py
