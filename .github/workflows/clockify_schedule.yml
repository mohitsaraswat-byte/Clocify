name: Clockify Auto Tracker

on:
  schedule:
    # --- START TIMER: 10:00 AM IST = 04:30 UTC (Mon–Fri) ---
    - cron: '30 4 * * 1-5'

    # --- STOP TIMER:  6:00 PM IST = 12:30 UTC (Mon–Fri) ---
    - cron: '30 12 * * 1-5'

  # Allows you to manually trigger either run from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-clockify-script:
    name: Run Clockify Automation
    runs-on: ubuntu-latest

    # Max 25 min — covers the 15-min random sleep + API call time
    timeout-minutes: 25

    env:
      CLOCKIFY_API_KEY:      ${{ secrets.CLOCKIFY_API_KEY }}
      CLOCKIFY_WORKSPACE_ID: ${{ secrets.CLOCKIFY_WORKSPACE_ID }}
      CLOCKIFY_USER_ID:      ${{ secrets.CLOCKIFY_USER_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Clockify automation script
        run: python clockify_automation.py
