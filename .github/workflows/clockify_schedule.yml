name: Clockify Daily Automation

on:
  schedule:
    # Runs at 4:30 AM UTC (10:00 AM IST), Monday through Saturday
    - cron: '30 4 * * 1-6' 
  workflow_dispatch: # Allows you to trigger the script manually from the GitHub Actions tab

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Clockify Script
        env:
          # Ensure these match the exact names of your GitHub Secrets
          CLOCKIFY_API_KEY: ${{ secrets.CLOCKIFY_API_KEY }}
          CLOCKIFY_WORKSPACE_ID: ${{ secrets.CLOCKIFY_WORKSPACE_ID }}
          CLOCKIFY_USER_ID: ${{ secrets.CLOCKIFY_USER_ID }}
        run: python main.py
